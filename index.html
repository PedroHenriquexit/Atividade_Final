<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./css/stlye.css">
</head>

<body>
    <!-- topo -->
    <header class="header">
        <div class="top-header">

            <!-- Logo -->
            <div class="logo">
                <img src="https://static-file.petz.com.br/platforms/img/ds/petz/logo-petz-primary.svg" alt="Logo Petz">
            </div>

            <!-- Pesquisa -->
            <div class="Pesquisa">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="O que seu pet precisa?">
            </div>

            <!-- Ícones -->
            <div class="icons">
                <!-- Telefone -->
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 384 384" class="telefone">
                    <path fill="currentColor"
                        d="M77 166q47 93 141 141l47-47q9-10 22-5q36 12 76 12q8 0 14.5 6t6.5 15v75q0 8-6.5 14.5T363 384q-99 0-182.5-48.5t-132-132T0 21q0-8 6.5-14.5T21 0h75q9 0 15 6.5t6 14.5q0 40 12 76q4 13-5 22z" />
                </svg>

                <!-- Favoritos -->
                <i class="fa-regular fa-heart"></i>

                <!-- Sacola -->
                <i class="fa-solid fa-bag-shopping"></i>

                <!-- Usuário -->
                <i class="fa-regular fa-user"></i>
            </div>

        </div>

        <!-- Menu -->
        <nav class="menu-nav">
            <ul>
                <li>Cachorro</li>
                <li>Gato</li>
                <li>Pássaro</li>
                <li>Peixe</li>
                <li>Outros Pets</li>
                <li>Cupon</li>
                <li>Promoções</li>
                <li>Suporte</li>
            </ul>
        </nav>
    </header>


    <!-- conteudo -->

    <main>
        <div id="carouselExampleIndicators" class="carousel slide">
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"
                    aria-current="true" aria-label="Slide 1"></button>
                <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"
                    aria-label="Slide 2"></button>
                <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"
                    aria-label="Slide 3"></button>
            </div>
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="./img/412bab3d-c866-4bcb-bca5-961702bccb7d.webp" class="d-block w-100" alt="...">
                </div>
                <div class="carousel-item">
                    <img src="./img/Home_Desk_1900x390__ajuste_petzday-medicamentos_CRIACAO_2026_06.jpg" class="d-block w-100" alt="...">
                </div>
                <div class="carousel-item">
                    <img src="..." class="d-block w-100" alt="...">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators"
                data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators"
                data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>

    </main>


    <!-- Rodapé -->

    <footer>


    </footer>



</body>

</html>
